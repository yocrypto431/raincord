name: Generate plugins.json

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "src/raincordplugins/**"
      - "src/plugins/**"
      - "src/utils/constants.ts"
      - "scripts/generatePluginList.ts"
      - "scripts/utils.ts"
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate plugins.json
        run: pnpm generatePluginJson plugins.json

      - name: Commit and push plugins.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update plugins.json [skip ci]"
          file_pattern: plugins.json
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
