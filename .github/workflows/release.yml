name: Build & Release RAINCORD

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build standalone
        run: pnpm buildStandalone

      - name: Build Installer
        shell: pwsh
        run: |
          cd electron-installer
          npm install
          Copy-Item "../icon.ico" "icon.ico" -Force
          $env:CSC_IDENTITY_AUTO_DISCOVERY="false"
          npx electron-builder --win portable

      - name: Package RAINCORD-dist.zip
        shell: pwsh
        run: |
          $staging = "RAINCORD-dist-staging"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          if (Test-Path "dist") { Copy-Item "dist" "$staging\dist" -Recurse }
          if (Test-Path "ghost-server") { Copy-Item "ghost-server" "$staging\ghost-server" -Recurse }
          foreach ($f in @("raincord-index.js", "raincord-preload.js")) {
            if (Test-Path $f) { Copy-Item $f "$staging\" }
          }
          Compress-Archive -Path "$staging\*" -DestinationPath "RAINCORD-dist.zip" -Force

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: RainCord v${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: |
            RAINCORD-dist.zip
            electron-installer/dist/RainCord-Installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
