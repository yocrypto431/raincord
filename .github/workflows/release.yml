name: Build & Release RAINCORD

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          if [ $PATCH -ge 10 ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          fi
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW"
          sed -i "s/\"version\": \"$CURRENT\"/\"version\": \"$NEW\"/" package.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NEW\"/" electron-installer/package.json

      - name: Build standalone
        run: pnpm buildStandalone

      - name: Build Installer
        shell: pwsh
        run: |
          cd electron-installer
          npm install
          Copy-Item "../icon.ico" "icon.ico" -Force
          $env:CSC_IDENTITY_AUTO_DISCOVERY="false"
          npx electron-builder --win portable

      - name: Package RAINCORD-dist.zip
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\desktop\*" -DestinationPath "RAINCORD-dist.zip" -Force

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline -20 --pretty=format:"- %s")
          else
            COMMITS=$(git log --oneline ${PREV_TAG}..HEAD --pretty=format:"- %s")
          fi
          COMMITS=$(echo "$COMMITS" | grep -v "\[skip ci\]" | grep -v "chore: bump" | head -20)
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: RainCord v${{ steps.version.outputs.version }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.commits }}
          make_latest: true
          files: |
            RAINCORD-dist.zip
            electron-installer/dist/RainCord-Installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json electron-installer/package.json
          git commit -m "chore: bump to v${{ steps.version.outputs.version }} [skip ci]" || true
          git push --force-with-lease || true
