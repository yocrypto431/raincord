name: Build & Release RAINCORD

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump patch version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $parts = $pkg.version.Split(".")
          $parts[2] = [int]$parts[2] + 1
          $pkg.version = $parts -join "."
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json -NoNewline
          echo "New version: $($pkg.version)"

          $installerPkg = Get-Content electron-installer/package.json | ConvertFrom-Json
          $installerPkg.version = $pkg.version
          $installerPkg | ConvertTo-Json -Depth 10 | Set-Content electron-installer/package.json -NoNewline

      - name: Build standalone
        run: pnpm buildStandalone

      - name: Build Installer
        shell: pwsh
        run: |
          cd electron-installer
          npm install
          Copy-Item "../icon.ico" "icon.ico" -Force
          $env:CSC_IDENTITY_AUTO_DISCOVERY="false"
          npx electron-builder --win portable

      - name: Package RAINCORD-dist.zip
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\desktop\*" -DestinationPath "RAINCORD-dist.zip" -Force

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: RainCord v${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: |
            RAINCORD-dist.zip
            electron-installer/dist/RainCord-Installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json electron-installer/package.json
          git commit -m "chore: bump to v${{ steps.version.outputs.version }} [skip ci]" || true
          git pull --rebase origin main || true
          git push
